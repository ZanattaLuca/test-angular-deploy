<div class="wheel-module">
  <div class="wheel-container">
    <div class="wheel-pointer"></div>
    <canvas
      #canvas
      [width]="size()"
      [height]="size()"
      class="wheel-canvas"
    ></canvas>
  </div>
  <button class="wheel-btn" (click)="spin()" [disabled]="btnDisabled">
    Lancia la Poké Ball
  </button>
</div>
