<div class="wheel-module">
  <canvas
    #canvas
    [width]="size()"
    [height]="size()"
    class="wheel-canvas"
  ></canvas>
  <button class="wheel-btn" (click)="spin()" [disabled]="btnDisabled">
    Gira la ruota
  </button>
  @if (result) {
    <div class="wheel-result">{{ result }}</div>
  }
</div>
